<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskr — Stay on top of it</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="noise"></div>

  <header>
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span>Taskr</span>
    </div>
    <div class="stats">
      <span id="stat-count">0 tasks</span>
      <span id="stat-done">0 done</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>What needs<br/><em>doing today?</em></h1>
    </section>

    <div class="input-area">
      <div class="input-wrapper">
        <input
          type="text"
          id="task-input"
          placeholder="Add a new task…"
          maxlength="200"
          autocomplete="off"
        />
        <button id="add-btn" aria-label="Add task">
          <span>+</span>
        </button>
      </div>
      <div id="input-error" class="input-error" role="alert"></div>
    </div>

    <div class="filters" role="tablist">
      <button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
      <button class="filter-btn" data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="filter-btn" data-filter="completed" role="tab" aria-selected="false">Completed</button>
    </div>

    <div id="task-list" class="task-list" role="list" aria-label="Tasks"></div>

    <div id="empty-state" class="empty-state" hidden>
      <div class="empty-icon">◎</div>
      <p id="empty-msg">Nothing here yet. Add your first task above.</p>
    </div>

    <div class="list-footer" id="list-footer" hidden>
      <span id="remaining"></span>
      <button id="clear-completed" class="clear-btn">Clear completed</button>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="modal-overlay" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Edit Task</h2>
      <input type="text" id="modal-input" maxlength="200" autocomplete="off"/>
      <div id="modal-error" class="input-error" role="alert"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
